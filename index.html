<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一键组标题 - 阿里国际站标题生成器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 30px 0; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
.header p { margin-top: 8px; font-size: 14px; opacity: .85; }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Upload Area */
.upload-area {
  background: #fff; border: 2px dashed #c4c9d4; border-radius: 16px;
  min-height: 340px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  cursor: pointer; transition: all .3s; margin-bottom: 20px;
  position: relative; box-shadow: 0 2px 16px rgba(0,0,0,.06);
}
.upload-area:hover, .upload-area.dragover {
  border-color: #1a73e8; background: #e8f0fe;
  box-shadow: 0 4px 24px rgba(26,115,232,.12);
}
.upload-area .icon { font-size: 64px; line-height: 1; }
.upload-area .main-text { font-size: 22px; font-weight: 700; color: #333; }
.upload-area .sub-text { font-size: 14px; color: #999; margin-top: 2px; }
.upload-area input[type="file"] { display: none; }

/* Settings */
.settings {
  background: #fff; border-radius: 12px; padding: 20px 24px;
  margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.settings label { font-size: 14px; font-weight: 600; color: #555; }
.settings input[type="number"] {
  width: 80px; padding: 6px 10px; border: 1px solid #d0d5dd; border-radius: 6px;
  font-size: 14px; text-align: center;
}
.settings .info { font-size: 12px; color: #999; margin-left: 4px; }

.btn-generate {
  background: linear-gradient(135deg, #1a73e8, #1565c0); color: #fff;
  border: none; padding: 12px 36px; border-radius: 8px; font-size: 16px;
  font-weight: 600; cursor: pointer; transition: all .2s; letter-spacing: 1px;
}
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,115,232,.4); }
.btn-generate:disabled { background: #bbb; cursor: not-allowed; transform: none; box-shadow: none; }

/* File info */
.file-info {
  background: #e8f5e9; border-radius: 8px; padding: 12px 18px;
  margin-bottom: 20px; display: none; font-size: 14px; color: #2e7d32;
  border: 1px solid #a5d6a7;
}
.file-info .filename { font-weight: 700; }

/* Progress */
.progress-bar { display: none; margin-bottom: 20px; }
.progress-bar .bar-bg { background: #e0e0e0; border-radius: 6px; height: 8px; overflow: hidden; }
.progress-bar .bar-fill { background: linear-gradient(90deg, #1a73e8, #42a5f5); height: 100%; border-radius: 6px; transition: width .3s; }
.progress-bar .bar-text { font-size: 13px; color: #666; margin-top: 4px; text-align: center; }

/* Results */
.results { display: none; }
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
}
.results-header h2 { font-size: 20px; color: #1a73e8; }
.results-header .stats { font-size: 13px; color: #888; }

.btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-action {
  padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid; transition: all .2s;
}
.btn-copy { background: #fff; color: #1a73e8; border-color: #1a73e8; }
.btn-copy:hover { background: #e8f0fe; }
.btn-download { background: #0d8a4a; color: #fff; border-color: #0d8a4a; }
.btn-download:hover { background: #0a7a40; }
.btn-clear { background: #fff; color: #e53935; border-color: #e53935; }
.btn-clear:hover { background: #fce4ec; }

/* Table */
.table-wrap {
  background: #fff; border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.08);
}
.table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-wrap thead th {
  background: #1a73e8; color: #fff; padding: 12px 14px;
  text-align: left; font-weight: 600; position: sticky; top: 0; z-index: 2;
  white-space: nowrap;
}
.table-wrap thead th:nth-child(1) { width: 180px; }
.table-wrap thead th:nth-child(2) { width: 50px; text-align: center; }
.table-wrap thead th:nth-child(4) { width: 70px; text-align: center; }
.table-wrap tbody td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
.table-wrap tbody tr:hover { background: #f5f8ff; }
.table-wrap tbody tr:nth-child(even) { background: #fafbfc; }
.table-wrap tbody tr:nth-child(even):hover { background: #f0f4ff; }
.table-wrap tbody td:nth-child(2) { text-align: center; color: #888; }
.table-wrap tbody td:nth-child(4) { text-align: center; font-weight: 600; }

.chars-green { color: #1b5e20; background: #e8f5e9; border-radius: 4px; padding: 2px 8px; }
.chars-yellow { color: #e65100; background: #fff3e0; border-radius: 4px; padding: 2px 8px; }
.chars-red { color: #b71c1c; background: #fce4ec; border-radius: 4px; padding: 2px 8px; }

.root-divider td { background: #e3f2fd !important; font-weight: 700; color: #1565c0; padding: 8px 14px !important; }

/* Toast */
.toast {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
  background: #323232; color: #fff; padding: 12px 28px; border-radius: 8px;
  font-size: 14px; z-index: 9999; opacity: 0; transition: opacity .3s;
  pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; }


/* Responsive */
@media (max-width: 768px) {
  .container { padding: 12px; }
  .settings { flex-direction: column; align-items: flex-start; }
  .results-header { flex-direction: column; }
}



</style>
</head>
<body>

<div class="header">
  <h1>📋 一键组标题</h1>
  <p>阿里国际站标题生成器 — 拖入 Excel 表格，一键生成128字符标题</p>
</div>

<div class="container">

  <div class="upload-area" id="uploadArea">
    <div class="icon">📂</div>
    <div class="main-text">点击上传 或 拖拽 Excel 文件到这里</div>
    <div class="sub-text">支持 .xlsx / .xls 格式</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>

  <div class="file-info" id="fileInfo">
    ✅ 已加载文件：<span class="filename" id="fileName"></span>，
    共 <span id="kwCount">0</span> 个关键词，<span id="rootCount">0</span> 个词根
  </div>

  <div class="settings">
    <div>
      <label>每个词根生成标题数：</label>
      <input type="number" id="titleCount" value="100" min="1" max="500">
      <span class="info">（建议 50–200）</span>
    </div>
    <div>
      <label>最大字符数：</label>
      <input type="number" id="maxChars" value="128" min="60" max="200">
    </div>
    <button class="btn-generate" id="btnGenerate" disabled>🚀 一键生成标题</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0"></div></div>
    <div class="bar-text" id="barText">准备中...</div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div>
        <h2>📊 生成结果</h2>
        <div class="stats" id="statsText"></div>
      </div>
      <div class="btn-group">
        <button class="btn-action btn-copy" onclick="copyTable()">📋 复制表格</button>
        <button class="btn-action btn-download" onclick="downloadExcel()">⬇️ 下载 Excel</button>
        <button class="btn-action btn-clear" onclick="clearAll()">🗑️ 清空重来</button>
      </div>
    </div>
    <div class="table-wrap" id="tableWrap"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ==================== Global State ====================
let parsedData = {}; // { root: [{kw, index}] }
let generatedResults = []; // [{root, seq, title, chars}]

// ==================== Upload ====================
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!/\.xlsx?$/i.test(file.name)) { showToast('❌ 请上传 .xlsx 或 .xls 格式文件'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      parseData(rows, file.name);
    } catch (err) {
      showToast('❌ 文件解析失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseData(rows, filename) {
  parsedData = {};
  const seenKw = {};
  let totalKw = 0;

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[0]) continue;
    const root = String(row[0]).trim();
    const kwEn = row[1] ? String(row[1]).trim() : '';
    let searchIdx = 0;
    // Try col index 3 first (搜索指数), fallback to col 2
    if (row[3] !== undefined && row[3] !== null && row[3] !== '') {
      searchIdx = parseInt(row[3]) || 0;
    } else if (row[2] !== undefined && !isNaN(parseInt(row[2]))) {
      searchIdx = parseInt(row[2]) || 0;
    }

    if (!kwEn || kwEn === root || kwEn === 'nan' || kwEn === 'undefined') continue;

    if (!parsedData[root]) { parsedData[root] = []; seenKw[root] = new Set(); }
    if (!seenKw[root].has(kwEn.toLowerCase())) {
      seenKw[root].add(kwEn.toLowerCase());
      parsedData[root].push({ kw: kwEn, index: searchIdx });
      totalKw++;
    }
  }

  const rootCount = Object.keys(parsedData).length;
  if (rootCount === 0) { showToast('❌ 未识别到有效数据，请检查表格格式'); return; }

  document.getElementById('fileInfo').style.display = 'block';
  document.getElementById('fileName').textContent = filename;
  document.getElementById('kwCount').textContent = totalKw;
  document.getElementById('rootCount').textContent = rootCount;
  document.getElementById('btnGenerate').disabled = false;
  uploadArea.querySelector('.main-text').textContent = '✅ 文件已加载，点击可重新上传';
  showToast('✅ 文件解析成功！');
}

// ==================== Title Generation ====================
const SMALL_WORDS = new Set(['a','an','the','and','but','or','nor','for','yet','so','at','by','in','of','on','to','up','as','is','it','if','no','do']);
const SKIP_WORDS = new Set([
  '$50.40','ws-3','dy-2kg','gree','r500','hb','m2','b',
  'eletric','coffeee','lgs','ga','>',
  'wintop','santoker','master','kktect','sonifer','blueking',
  'dalian','dongyi','simonelli','probat','hottop','yoshan','gene','cafe',
  '110v','220v','110','v','kg','k','1kgbean','cocoa'
]);
const TYPO_FIX = { 'eletric': 'electric', 'coffeee': 'coffee', 'programed': 'programmed' };

function titleCase(s) {
  return s.split(' ').map((w, i) => {
    if (!w) return '';
    if (i === 0) return w[0].toUpperCase() + w.slice(1);
    if (SMALL_WORDS.has(w.toLowerCase()) && w.length < 4) return w.toLowerCase();
    return w[0].toUpperCase() + w.slice(1);
  }).join(' ');
}

function cleanWord(w) {
  w = w.replace(/^[,\-\/\(\)"']+|[,\-\/\(\)"']+$/g, '');
  if (!w) return null;
  if (SKIP_WORDS.has(w.toLowerCase())) return null;
  if (w.startsWith('$') || w.startsWith('-')) return null;
  if (!/[a-zA-Z]/.test(w)) return null;
  if (TYPO_FIX[w.toLowerCase()]) w = TYPO_FIX[w.toLowerCase()];
  return w;
}

function extractNewWords(keyword, rootWords, usedWords) {
  const words = keyword.toLowerCase().split(/\s+/);
  const result = [];
  const added = new Set();
  for (let w of words) {
    w = cleanWord(w);
    if (w && !rootWords.has(w.toLowerCase()) && !usedWords.has(w.toLowerCase()) && !added.has(w.toLowerCase())) {
      result.push(w);
      added.add(w.toLowerCase());
    }
  }
  return result;
}

// Simple seeded random
function seededRandom(seed) {
  let s = seed % 2147483647;
  if (s <= 0) s += 2147483646;
  return () => { s = s * 16807 % 2147483647; return (s - 1) / 2147483646; };
}

function shuffleArray(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildTitles(root, keywords, numTitles, maxChars) {
  const titles = [];
  if (!keywords.length) return titles;

  const rootWords = new Set(root.toLowerCase().split(/\s+/));

  // Sort by index desc, stable — higher index = higher priority
  const sorted = [...keywords].sort((a, b) => b.index - a.index);

  // Group into tiers by index value (same index = same tier, shuffled within)
  const tiers = [];
  let lastIdx = null;
  for (const item of sorted) {
    if (item.index !== lastIdx) { tiers.push([]); lastIdx = item.index; }
    tiers[tiers.length - 1].push(item);
  }

  const titleSet = new Set();

  for (let attempt = 0; attempt < numTitles * 20 && titles.length < numTitles; attempt++) {
    const rng = seededRandom(attempt * 233 + titles.length * 97 + 7);

    const usedWords = new Set(rootWords);
    const selectedParts = [];   // each element = array of words from one keyword
    let remaining = maxChars - root.length - 1; // -1 for the space before root

    // Build ordered list: within each tier shuffle randomly, tiers stay high→low
    const available = [];
    for (const tier of tiers) {
      const copy = [...tier];
      shuffleArray(copy, rng);
      available.push(...copy);
    }

    // Greedy fill: pick every keyword whose new words fit
    for (const item of available) {
      const newWords = extractNewWords(item.kw, rootWords, usedWords);
      if (!newWords.length) continue;
      const chunk = newWords.join(' ');
      const needed = chunk.length + 1; // +1 for leading space
      if (needed <= remaining) {
        selectedParts.push(newWords);
        newWords.forEach(w => usedWords.add(w.toLowerCase()));
        remaining -= needed;
      }
    }

    if (!selectedParts.length) continue;

    // Shuffle the collected word-blocks (root stays anchored at right)
    shuffleArray(selectedParts, rng);

    const allWords = selectedParts.flat().concat(root.split(/\s+/));
    const formatted = titleCase(allWords.join(' '));

    if (formatted.length <= maxChars && !titleSet.has(formatted)) {
      titleSet.add(formatted);
      titles.push(formatted);
    }
  }
  return titles;
}

// ==================== Generate Button ====================
document.getElementById('btnGenerate').addEventListener('click', () => {
  const numTitles = parseInt(document.getElementById('titleCount').value) || 100;
  const maxChars = parseInt(document.getElementById('maxChars').value) || 128;
  generatedResults = [];

  const progressBar = document.getElementById('progressBar');
  const barFill = document.getElementById('barFill');
  const barText = document.getElementById('barText');
  progressBar.style.display = 'block';

  const roots = Object.keys(parsedData);
  let processed = 0;

  function processNext() {
    if (processed >= roots.length) {
      barFill.style.width = '100%';
      barText.textContent = `✅ 完成！共生成 ${generatedResults.length} 条标题`;
      setTimeout(() => { progressBar.style.display = 'none'; renderResults(); }, 600);
      return;
    }

    const root = roots[processed];
    const pct = Math.round((processed / roots.length) * 100);
    barFill.style.width = pct + '%';
    barText.textContent = `正在生成 [${root}] ... (${processed + 1}/${roots.length})`;

    setTimeout(() => {
      const titles = buildTitles(root, parsedData[root], numTitles, maxChars);
      titles.forEach((t, i) => {
        generatedResults.push({ root, seq: i + 1, title: t, chars: t.length });
      });
      processed++;
      processNext();
    }, 10);
  }

  processNext();
});

// ==================== Render Results ====================
function renderResults() {
  if (!generatedResults.length) return;

  const results = document.getElementById('results');
  results.style.display = 'block';

  // Stats
  const rootStats = {};
  generatedResults.forEach(r => {
    if (!rootStats[r.root]) rootStats[r.root] = { count: 0, min: 999, max: 0, total: 0 };
    rootStats[r.root].count++;
    rootStats[r.root].min = Math.min(rootStats[r.root].min, r.chars);
    rootStats[r.root].max = Math.max(rootStats[r.root].max, r.chars);
    rootStats[r.root].total += r.chars;
  });

  let statsHtml = `共 ${generatedResults.length} 条标题 | `;
  for (const [root, s] of Object.entries(rootStats)) {
    statsHtml += `[${root}] ${s.count}条 (${s.min}-${s.max}字符, 均${Math.round(s.total / s.count)}) &nbsp;`;
  }
  document.getElementById('statsText').innerHTML = statsHtml;

  // Table
  let html = '<table id="resultTable"><thead><tr><th>词根</th><th>序号</th><th>组合标题</th><th>字符数</th></tr></thead><tbody>';

  let lastRoot = '';
  generatedResults.forEach(r => {
    if (r.root !== lastRoot) {
      if (lastRoot) html += `<tr class="root-divider"><td colspan="4">▼ ${r.root}</td></tr>`;
      else html += `<tr class="root-divider"><td colspan="4">▼ ${r.root}</td></tr>`;
      lastRoot = r.root;
    }

    let charsClass = 'chars-green';
    if (r.chars < 90) charsClass = 'chars-red';
    else if (r.chars < 115) charsClass = 'chars-yellow';

    html += `<tr>
      <td>${r.root}</td>
      <td>${r.seq}</td>
      <td>${r.title}</td>
      <td><span class="${charsClass}">${r.chars}</span></td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ==================== Copy ====================
function copyTable() {
  if (!generatedResults.length) return;
  let text = '词根\t序号\t组合标题\t字符数\n';
  generatedResults.forEach(r => {
    text += `${r.root}\t${r.seq}\t${r.title}\t${r.chars}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ 已复制到剪贴板！可直接粘贴到 Excel');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制到剪贴板！');
  });
}

// ==================== Download Excel ====================
function downloadExcel() {
  if (!generatedResults.length) return;

  const wsData = [['词根', '序号', '组合标题', '字符数']];
  generatedResults.forEach(r => wsData.push([r.root, r.seq, r.title, r.chars]));

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [{ wch: 25 }, { wch: 8 }, { wch: 100 }, { wch: 10 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '组合标题');

  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `阿里国际站组合标题_${dateStr}.xlsx`);
  showToast('✅ Excel 文件已下载！');
}

// ==================== Clear ====================
function clearAll() {
  parsedData = {};
  generatedResults = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('fileInfo').style.display = 'none';
  document.getElementById('tableWrap').innerHTML = '';
  document.getElementById('btnGenerate').disabled = true;
  uploadArea.querySelector('.main-text').textContent = '点击上传 或 拖拽 Excel 文件到这里';
  fileInput.value = '';
  showToast('🗑️ 已清空');
}

// ==================== Toast ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
